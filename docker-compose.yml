services:
  api:
    tty: true
    build: .
    container_name: estate-intelligence-backend-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - supabase_network
    volumes:
      - .:/app
      - /app/.venv

networks:
  supabase_network:
    external: true
    name: supabase_network_estate-intelligence-backend